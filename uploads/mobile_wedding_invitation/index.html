<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Haeseong & Chaewon — Mobile Wedding Invitation</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://spoqa.github.io/spoqa-han-sans/css/SpoqaHanSansNeo.css" rel="stylesheet" />
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet" />
<style>
  :root {
    --lime: #D8F23A;
    --lime-deep: #C8E844;
    --surface: #F8F6F0;
    --ink: #111111;
    --gray: #767676;
    --line: rgba(17,17,17,0.18);
  }
  html, body {
    margin: 0; padding: 0; min-height: 100%;
    background: #E9E7DF;
    font-family: 'Pretendard', system-ui, -apple-system, sans-serif;
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }
  body {
    background:
      radial-gradient(1200px 800px at 30% 0%, #ECEAE2 0%, #DAD8D0 60%, #C9C7BF 100%);
  }
  * { box-sizing: border-box; }
  button { font-family: inherit; }
  /* phone scaffold */
  .stage {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }
  /* utility for the invitation pages */
  .inv-screen {
    position: absolute;
    inset: 0;
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
  }
  .inv-screen::-webkit-scrollbar { width: 0; height: 0; }
  .label-en {
    font-family: 'Spoqa Han Sans Neo', sans-serif;
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    font-weight: 500;
    color: var(--gray);
  }
  .num-mono {
    font-family: 'Spoqa Han Sans Neo', sans-serif;
    font-feature-settings: 'tnum' on;
  }
  .display {
    font-family: 'Spoqa Han Sans Neo', sans-serif;
    letter-spacing: -0.02em;
    line-height: 0.88;
    font-weight: 700;
  }
  .serif {
    font-family: 'Spoqa Han Sans Neo', sans-serif;
    font-style: normal;
    font-weight: 300;
    letter-spacing: -0.01em;
  }
  .ko-light { font-weight: 300; letter-spacing: -0.01em; }
  .ko-reg { font-weight: 400; letter-spacing: -0.01em; }
  .ko-med { font-weight: 500; letter-spacing: -0.01em; }
  .ko-bold { font-weight: 700; letter-spacing: -0.01em; }
  /* photo b&w */
  .bw { filter: grayscale(100%) contrast(1.02); }
  /* lime-on-lime ban via this helper */
  .on-lime { color: var(--ink); }
  /* slide transition */
  .slide-in-right { animation: slideInRight 360ms cubic-bezier(.2,.7,.2,1) both; }
  .slide-in-left  { animation: slideInLeft 360ms cubic-bezier(.2,.7,.2,1) both; }
  @keyframes slideInRight {
    from { transform: translateX(100%); }
    to   { transform: translateX(0); }
  }
  @keyframes slideInLeft {
    from { transform: translateX(-100%); }
    to   { transform: translateX(0); }
  }
  /* hover on touch is meh — use :active states inside React */
  .tap { transition: opacity .15s ease, transform .15s ease; }
  .tap:active { opacity: .7; transform: scale(0.985); }
  /* hairline */
  .hr { height: 1px; background: var(--line); }
  .hr-ink { height: 1px; background: var(--ink); }
  .hr-light { height: 1px; background: rgba(17,17,17,0.35); }
  /* ken burns */
  @keyframes kenburns {
    from { transform: scale(1.0); }
    to   { transform: scale(1.06); }
  }
  .kenburns { animation: kenburns 14s ease-out forwards; }
  /* fade up */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .fade-up { animation: fadeUp .7s ease-out both; }
  .delay-1 { animation-delay: .15s; }
  .delay-2 { animation-delay: .30s; }
  .delay-3 { animation-delay: .45s; }
  .delay-4 { animation-delay: .60s; }
  .delay-5 { animation-delay: .75s; }

  /* big rotated WEDDING INVITATION */
  .vertical-headline {
    writing-mode: vertical-rl;
    transform: rotate(180deg);
    font-family: 'Spoqa Han Sans Neo', sans-serif;
    font-weight: 700;
    letter-spacing: -0.005em;
  }

  /* helper for backdrop scrim */
  .scrim {
    position: absolute; inset: 0; background: rgba(0,0,0,0.45);
    backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
    z-index: 100;
  }

  /* ──────────────────────────────────────────────────────
     DOVE TRANSITION
     Total: 1700ms
     0-50%   : dove flies in from edge, carrying tiny envelope
     50-58%  : envelope grows to fill the frame
     [55%: route content swaps underneath]
     58-92%  : envelope opens — top flap rotates up, bottom slides down
     70-100% : dove continues out the opposite edge
     ────────────────────────────────────────────────────── */
  .dove-stage {
    position: absolute; inset: 0;
    pointer-events: none;
    overflow: hidden;
    z-index: 200;
  }

  /* dove wrap: flies across in an arc */
  .dove-wrap {
    position: absolute;
    width: 140px; height: 90px;
    top: 50%; left: 50%;
    margin-left: -70px; margin-top: -45px;
    animation: dove-fly-rtl 1700ms cubic-bezier(.45,.05,.3,.95) forwards;
    will-change: transform;
  }
  .dove-stage[data-dir="left"] .dove-wrap {
    animation-name: dove-fly-ltr;
  }
  .dove-stage[data-dir="left"] .dove-svg {
    transform: scaleX(-1);
    transform-origin: center;
  }
  .dove-stage[data-dir="left"] .env-tiny {
    /* tiny envelope rides on the OTHER side of dove when flying ltr */
    left: -34px; right: auto;
  }

  /* flight path: enters from right, dips to center, exits left */
  @keyframes dove-fly-rtl {
    0%   { transform: translate(180%, 70%)  rotate(-14deg); }
    20%  { transform: translate(100%, 20%)  rotate(-6deg); }
    38%  { transform: translate(30%,  -10%) rotate(2deg);  }
    50%  { transform: translate(0,    -5%)  rotate(0deg);  }
    58%  { transform: translate(-10%, -2%)  rotate(2deg);  }
    72%  { transform: translate(-90%, -30%) rotate(8deg);  }
    100% { transform: translate(-220%,-80%) rotate(16deg); }
  }
  @keyframes dove-fly-ltr {
    0%   { transform: translate(-180%, 70%)  rotate(14deg); }
    20%  { transform: translate(-100%, 20%)  rotate(6deg);  }
    38%  { transform: translate(-30%,  -10%) rotate(-2deg); }
    50%  { transform: translate(0,     -5%)  rotate(0deg);  }
    58%  { transform: translate(10%,   -2%)  rotate(-2deg); }
    72%  { transform: translate(90%,  -30%)  rotate(-8deg); }
    100% { transform: translate(220%, -80%)  rotate(-16deg);}
  }

  /* wings: continuous flap */
  .dove-wing-front {
    transform-box: fill-box;
    transform-origin: 80% 95%;
    animation: wing-flap 240ms ease-in-out infinite;
  }
  .dove-wing-back {
    transform-box: fill-box;
    transform-origin: 75% 95%;
    animation: wing-flap-back 240ms ease-in-out infinite;
  }
  @keyframes wing-flap {
    0%, 100% { transform: rotateZ(0deg) scaleY(1);   }
    50%      { transform: rotateZ(-22deg) scaleY(0.55); }
  }
  @keyframes wing-flap-back {
    0%, 100% { transform: rotateZ(0deg) scaleY(0.9); }
    50%      { transform: rotateZ(-14deg) scaleY(0.5); }
  }

  /* tiny envelope held at beak */
  .env-tiny {
    position: absolute;
    right: -28px; top: 30%;
    width: 40px; height: 28px;
    animation: env-tiny-fade 1700ms forwards;
    transform-origin: center;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.18));
  }
  @keyframes env-tiny-fade {
    0%, 44%  { opacity: 1; transform: scale(1) rotate(0deg); }
    50%      { opacity: 1; transform: scale(1.15) rotate(-4deg); }
    52%, 100%{ opacity: 0; transform: scale(2) rotate(0deg); }
  }

  /* big envelope grows from center then opens */
  .env-big {
    position: absolute;
    top: 50%; left: 50%;
    width: 40px; height: 28px;
    transform: translate(-50%, -50%);
    animation: env-big-size 1700ms cubic-bezier(.4,.0,.2,1) forwards;
    will-change: width, height, opacity;
    pointer-events: none;
  }
  @keyframes env-big-size {
    0%, 48%  { width: 0px;    height: 0px;    opacity: 0; }
    49%      { width: 40px;   height: 28px;   opacity: 1; }
    58%      { width: 110%;   height: 115%;   opacity: 1; }
    96%      { width: 110%;   height: 115%;   opacity: 1; }
    100%     { width: 110%;   height: 115%;   opacity: 0; }
  }

  /* envelope BACK (bottom half) — letter peeks out as flap opens */
  .env-bot {
    position: absolute; left: 0; bottom: 0;
    width: 100%; height: 100%;
    background: #F8F6F0;
    border: 1.5px solid #111;
    overflow: hidden;
    animation: env-bot-out 1700ms cubic-bezier(.5,.05,.3,.95) forwards;
    transform-origin: top center;
  }
  @keyframes env-bot-out {
    0%, 88%  { transform: translateY(0); }
    100%     { transform: translateY(140%); }
  }

  /* envelope TOP flap — rotates open then flies up */
  .env-top {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 50%;
    transform-origin: bottom center;
    animation: env-top-out 1700ms cubic-bezier(.5,.05,.3,.95) forwards;
    z-index: 2;
  }
  @keyframes env-top-out {
    0%, 58%   { transform: rotateX(0deg) translateY(0); }
    70%       { transform: rotateX(-160deg) translateY(0); }
    88%       { transform: rotateX(-160deg) translateY(0); }
    100%      { transform: rotateX(-160deg) translateY(-160%); }
  }
  .env-flap {
    position: absolute; inset: 0;
    background:
      linear-gradient(to bottom right, transparent 49.5%, #111 49.5%, #111 50.5%, transparent 50.5%),
      linear-gradient(to bottom left,  transparent 49.5%, #111 49.5%, #111 50.5%, transparent 50.5%),
      #F8F6F0;
    border: 1.5px solid #111;
    border-bottom: none;
  }

  /* lines on the letter inside envelope */
  .env-content-line {
    position: absolute;
    left: 12%; width: 76%;
    height: 6px;
    background: rgba(17,17,17,0.12);
    border-radius: 99px;
  }
  .env-content-line:nth-child(1) { top: 18%; }
  .env-content-line:nth-child(2) { top: 32%; width: 60%; }
  .env-content-line:nth-child(3) { top: 46%; }
  .env-seal {
    position: absolute;
    width: 44px; height: 44px;
    border-radius: 99px;
    bottom: 18%; left: 50%;
    transform: translateX(-50%) rotate(-6deg);
    border: 1.5px solid #111;
    display: flex; align-items: center; justify-content: center;
    color: #111; font-weight: 700; font-size: 22px;
    box-shadow: inset 0 0 0 2px rgba(255,255,255,0.4);
  }
</style>
</head>
<body>

<div id="root"></div>
